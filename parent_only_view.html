<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parent Portal</title>

<style>

:root{
    --bg1:#07111f;
    --bg2:#0f172a;
    --card:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.12);
    --text:#ffffff;
    --muted:#cbd5e1;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;

    background:
    radial-gradient(circle at bottom right,#0ea5e9 0%,transparent 30%),
    linear-gradient(135deg,var(--bg1),var(--bg2));

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.container{
    width:100%;
    max-width:650px;
}

.top{
    text-align:center;
    margin-bottom:25px;
}

.top h1{
    font-size:42px;
    margin-bottom:10px;
}

.top p{
    color:var(--muted);
}

.logout-link{
    display:inline-block;
    margin-top:10px;
    color:#93c5fd;
    text-decoration:none;
    font-size:14px;
    cursor:pointer;
}

.logout-link:hover{
    text-decoration:underline;
}

.card{
    background:var(--card);

    border:1px solid var(--border);

    border-radius:24px;

    padding:25px;

    backdrop-filter:blur(10px);
}

input,
button{
    width:100%;

    padding:15px;

    border:none;

    border-radius:14px;

    margin-bottom:15px;

    font-size:16px;
}

input{
    background:rgba(255,255,255,0.08);
    color:white;
}

button{
    background:
    linear-gradient(
        135deg,
        #38bdf8,
        #2563eb
    );

    color:white;

    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.result{
    margin-top:20px;
}

.result-card{
    background:rgba(255,255,255,0.06);

    border-radius:18px;

    padding:22px;

    border:
    1px solid rgba(255,255,255,0.08);
}

.result-card h2{
    margin-bottom:18px;
}

.line{
    display:flex;
    justify-content:space-between;

    padding:12px 0;

    border-bottom:
    1px solid rgba(255,255,255,0.08);
}

.good{
    color:#4ade80;
}

.bad{
    color:#f87171;
}

</style>
</head>

<body>

<div class="container">

    <div class="top">

        <h1>Parent Portal</h1>

        <p id="sessionInfo"></p>
        <a class="logout-link" onclick="logout()">← Back to Login</a>

    </div>

    <div class="card">

        <input
        type="text"
        id="studentName"
        placeholder="Student Name">

        <input
        type="password"
        id="parentPassword"
        placeholder="Parent Password">

        <button onclick="viewAttendance()">
            View Attendance
        </button>

        <div class="result" id="result"></div>

    </div>

</div>

<script>

let students=[];
let attendance={};

function logout(){
    localStorage.removeItem("userRole");
    localStorage.removeItem("school");
    localStorage.removeItem("userId");
    window.location.href="index.html";
}

function checkAuth(){
    let role=localStorage.getItem("userRole");
    let school=localStorage.getItem("school");
    
    if(role!=="parent" || !school){
        window.location.href="index.html";
        return;
    }
    
    let schoolNames={
        "school1":"Central Public School",
        "school2":"Riverside Academy",
        "school3":"Green Valley High School",
        "school4":"St. Mary's Institution"
    };
    
    document.getElementById("sessionInfo").textContent=`${schoolNames[school]} | Parent ID: ${localStorage.getItem("userId")}`;
}

async function loadFiles(){

    let s=
    await fetch("data/students.json");

    students=await s.json();

    let a=
    await fetch("data/attendance.json");

    attendance=await a.json();

}

async function viewAttendance(){

    let name=
    document
    .getElementById("studentName")
    .value;

    let pass=
    document
    .getElementById("parentPassword")
    .value;

    let student=students.find(s=>

        s.name===name &&
        s.parentPassword===pass

    );

    if(!student){

        alert("Invalid Details");
        return;

    }

    let key=
    student.class+student.div;

    let records=
    attendance[key]
    .filter(r=>

        r.name===student.name

    );

    let total=records.length;

    let present=
    records.filter(r=>

        r.present

    ).length;

    let absent=
    total-present;

    let percent=
    ((present/total)*100)
    .toFixed(1);

    document
    .getElementById("result")
    .innerHTML=`

    <div class="result-card">

        <h2>${student.name}</h2>

        <div class="line">
            <span>Class</span>
            <span>
            ${student.class}${student.div}
            </span>
        </div>

        <div class="line">
            <span>Total Days</span>
            <span>${total}</span>
        </div>

        <div class="line">
            <span>Present</span>
            <span class="good">
            ${present}
            </span>
        </div>

        <div class="line">
            <span>Absent</span>
            <span class="bad">
            ${absent}
            </span>
        </div>

        <div class="line">
            <span>Attendance</span>
            <span class="good">
            ${percent}%
            </span>
        </div>

    </div>

    `;

}

checkAuth();
loadFiles();

</script>

</body>
</html>
