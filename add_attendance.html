<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Attendance Portal</title>

<style>

:root{
    --bg1:#07111f;
    --bg2:#0f172a;
    --card:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.12);
    --text:#ffffff;
    --muted:#cbd5e1;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;

    background:
    radial-gradient(circle at top left,#1d4ed8 0%,transparent 30%),
    linear-gradient(135deg,var(--bg1),var(--bg2));

    color:white;

    padding:25px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.top{
    margin-bottom:30px;
}

.top h1{
    font-size:42px;
    margin-bottom:10px;
}

.top p{
    color:var(--muted);
}

.card{
    background:var(--card);

    border:1px solid var(--border);

    border-radius:24px;

    padding:25px;

    backdrop-filter:blur(10px);
}

.controls{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:15px;

    margin-bottom:25px;
}

select,
button{
    padding:14px;

    border:none;

    border-radius:14px;

    font-size:16px;
}

select{
    background:rgba(255,255,255,0.08);
    color:white;
}

button{
    background:linear-gradient(135deg,#38bdf8,#2563eb);

    color:white;

    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.table-box{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:16px;
    text-align:center;
}

th{
    background:rgba(255,255,255,0.08);
}

tr{
    border-bottom:
    1px solid rgba(255,255,255,0.08);
}

.checkbox{
    width:22px;
    height:22px;
}

.info{
    margin-top:20px;
    color:#93c5fd;
}

</style>
</head>

<body>

<div class="container">

    <div class="top">

        <h1>Teacher Attendance Portal</h1>

        <p>
            Dynamically loads students from files
        </p>

    </div>

    <div class="card">

        <div class="controls">

            <select id="classSelect">
                <option value="">Select Class</option>
            </select>

            <select id="divSelect">
                <option value="">Select Division</option>
            </select>

            <button onclick="loadStudents()">
                Load Students
            </button>

            <button onclick="saveAttendance()">
                Save Attendance
            </button>

        </div>

        <div class="table-box">

            <table>

                <thead>

                    <tr>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Present</th>
                    </tr>

                </thead>

                <tbody id="studentTable">

                </tbody>

            </table>

        </div>

        <div class="info" id="info"></div>

    </div>

</div>

<script>

let students=[];

async function loadData(){

    let response=
    await fetch("data/students.json");

    students=await response.json();

    let classes=[
        ...new Set(
            students.map(s=>s.class)
        )
    ];

    let classSelect=
    document.getElementById("classSelect");

    classes.forEach(cls=>{

        classSelect.innerHTML+=
        `<option value="${cls}">
        ${cls}
        </option>`;

    });

}

document
.getElementById("classSelect")
.addEventListener("change",()=>{

    let selected=
    document.getElementById("classSelect").value;

    let divs=[

        ...new Set(

            students
            .filter(s=>s.class===selected)
            .map(s=>s.div)

        )

    ];

    let divSelect=
    document.getElementById("divSelect");

    divSelect.innerHTML=
    `<option value="">Select Division</option>`;

    divs.forEach(div=>{

        divSelect.innerHTML+=
        `<option value="${div}">
        ${div}
        </option>`;

    });

});

function loadStudents(){

    let cls=
    document.getElementById("classSelect").value;

    let div=
    document.getElementById("divSelect").value;

    let filtered=students.filter(s=>

        s.class===cls &&
        s.div===div

    );

    let table=
    document.getElementById("studentTable");

    table.innerHTML="";

    filtered.forEach(student=>{

        table.innerHTML+=`

        <tr>

            <td>${student.roll}</td>

            <td>${student.name}</td>

            <td>
                <input
                type="checkbox"
                class="checkbox"
                checked>
            </td>

        </tr>

        `;

    });

    document.getElementById("info")
    .innerText=
    `${filtered.length} students loaded`;

}

function saveAttendance(){

    let rows=
    document.querySelectorAll(
        "#studentTable tr"
    );

    let attendance=[];

    rows.forEach(row=>{

        let cells=row.querySelectorAll("td");

        attendance.push({

            roll:cells[0].innerText,
            name:cells[1].innerText,
            present:
            cells[2]
            .querySelector("input")
            .checked

        });

    });

    console.log(attendance);

    alert(
        "Attendance data ready to save"
    );

}

loadData();

</script>

</body>
</html>
